http {
server {
    listen 8080;
    root /Users/macbookuser/Desktop/NetCore/configs/client_max_body_size/www;
    client_max_body_size 100k;

    location / {
        root /Users/macbookuser/Desktop/NetCore/configs/client_max_body_size/www;
        index index.html;
        allowed_methods GET;
    }

    location /upload {
        root /Users/macbookuser/Desktop/NetCore/configs/client_max_body_size/www;
        allowed_methods POST;
        upload_location /Users/macbookuser/Desktop/NetCore/configs/client_max_body_size/uploads;
    }
}
}
