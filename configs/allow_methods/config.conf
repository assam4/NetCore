http {
server {
    listen 8080;
    root /home/lenovo/Desktop/Webserv/configs/allowed_methods/www;

    location / {
        root /home/lenovo/Desktop/Webserv/configs/allowed_methods/www;
        index index.html;
        allowed_methods GET;
    }

    location /upload {
        root /home/lenovo/Desktop/Webserv/configs/allowed_methods/www;
        allowed_methods POST;
        upload_location /home/lenovo/Desktop/Webserv/configs/allowed_methods/uploads;
    }
}
}
