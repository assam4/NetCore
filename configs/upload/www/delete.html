<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Delete</title></head>
<body>
  <h1>Delete file</h1>
  <input type="text" id="filename" placeholder="filename" />
  <button onclick="del()">Delete</button>
  <p id="result"></p>
  <p><a href="/files/">Browse files</a> | <a href="/">Back</a></p>
  <script>
    function del() {
      var name = document.getElementById('filename').value.trim();
      if (!name) return;
      fetch('/files/' + name, { method: 'DELETE' })
        .then(function(r) {
          document.getElementById('result').textContent =
            r.status === 204 ? 'Deleted.' : 'Error: ' + r.status;
        });
    }
  </script>
</body>
</html>
