<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>error_page — webserv</title>
  <style>
    body { font-family: sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
    pre { background: #f0f0f0; padding: 12px; border-radius: 4px; overflow: auto; }
    a.btn { display: inline-block; margin: 4px 4px 4px 0; padding: 8px 14px;
            background: #1976d2; color: white; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>error_page</h1>
  <p>Custom HTML error pages are served for 404 and 500 instead of the built-in fallback.</p>

  <h2>Trigger error pages</h2>
  <a class="btn" href="/nonexistent">Trigger 404</a>

  <h2>Terminal tests</h2>
  <pre>curl -i http://localhost:8080/nonexistent    # custom 404.html
curl -i http://localhost:8080/              # 200 OK</pre>
</body>
</html>
