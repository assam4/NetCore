server {
    listen 8080;
    root /home/saslanya/Desktop/NetCore/configs/tester;
    

    location / {
    allowed_methods GET;
        index index.html;
    }

    location /post_body {
        allowed_methods POST;
        client_max_body_size 100;
    }

    location = /directory {
        return 301 /directory/;
    }

    location /directory/ {
        allowed_methods GET;
        autoindex on;
        root /home/saslanya/Desktop/NetCore/configs/tester/;
        index youpi.bad_extension;
    }
    location /YoupiBanane {
        allowed_methods GET POST;
        root /home/saslanya/Desktop/NetCore/configs/tester/YoupiBanane;
        cgi_extension .bla /home/saslanya/Desktop/NetCore/cgi_tester;
    }
}
