server {
    listen 8080;
    root /home/lenovo/Desktop/Webserv/configs/tester;

    location / {
        allowed_methods GET;
        index index.html;
    }

    location /post_body {
        allowed_methods POST;
        client_max_body_size 100;
    }

    location /directory {
        allowed_methods GET POST;
        root /home/lenovo/Desktop/Webserv/configs/tester;
        index youpi.bad_extension;
        cgi_extension .bla /home/lenovo/Desktop/Webserv/cgi_tester;
    }

    location /YoupiBanane {
        allowed_methods GET POST;
        root /home/lenovo/Desktop/Webserv/configs/tester;
        cgi_extension .bla /home/lenovo/Desktop/Webserv/cgi_tester;
    }
}
