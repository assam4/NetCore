http {
server {
    listen 8080;
    root /home/lenovo/Desktop/Webserv/configs/errors/www;

    location / {
        root /home/lenovo/Desktop/Webserv/configs/errors/www;
        index index.html;
        allowed_methods GET;
    }

    location /post-no-store {
        root /home/lenovo/Desktop/Webserv/configs/errors/www;
        allowed_methods POST;
    }

    location /noindex {
        root /home/lenovo/Desktop/Webserv/configs/errors/www;
        autoindex off;
        allowed_methods GET;
    }
}
}
