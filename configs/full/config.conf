http {
server {
    listen 8080;
    root /Users/macbookuser/Desktop/NetCore/configs/full/www;
    client_max_body_size 10m;
    error_page 404 /404.html;

    location / {
        root /Users/macbookuser/Desktop/NetCore/configs/full/www;
        index index.html;
        allowed_methods GET;
    }

    location /files {
        root /Users/macbookuser/Desktop/NetCore/configs/full/www;
        autoindex on;
        allowed_methods GET DELETE;
    }

    location /old {
        return 301 http://localhost:8080/;
    }
}
}
