http {
server {
    listen 8080;
    root /home/lenovo/Desktop/Webserv/www;
    client_max_body_size 1m;

    location /cgi-bin {
        root /home/lenovo/Desktop/Webserv/www;
        allowed_methods GET POST;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .php /usr/bin/php-cgi;
    }
}
}
