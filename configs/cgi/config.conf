http {
server {
    listen 8080;
    root /Users/macbookuser/Desktop/NetCore/www;
    client_max_body_size 1m;

    location /cgi-bin {
        root /Users/macbookuser/Desktop/NetCore/www;
        allowed_methods GET POST;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .php /usr/bin/php-cgi;
    }
}
}
