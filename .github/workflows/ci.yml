name: NetCore CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Build all tests
      run: |
        cd test/server && make
        cd ../lexical && make
        cd ../syntax && make

    - name: Run server tests
      run: cd test/server && ./test

    - name: Run lexical tests
      run: cd test/lexical && ./test

    - name: Run syntax tests
      run: cd test/syntax && ./test