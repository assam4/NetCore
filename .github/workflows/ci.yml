name: NetCore CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Build vhosts tests
      run: |
        cd test/vhosts
        ls -l >> ../../ci_output.txt
        make >> ../../ci_output.txt 2>&1
        ls -l >> ../../ci_output.txt

    - name: Build lexical tests
      run: |
        cd test/lexical
        ls -l >> ../../ci_output.txt
        make >> ../../ci_output.txt 2>&1
        ls -l >> ../../ci_output.txt

    - name: Build syntax tests
      run: |
        cd test/syntax
        ls -l >> ../../ci_output.txt
        make >> ../../ci_output.txt 2>&1
        ls -l >> ../../ci_output.txt

    - name: Run server tests
      run: cd test/server && ./test >> ../../ci_output.txt 2>&1

    - name: Run lexical tests
      run: cd test/lexical && ./test >> ../../ci_output.txt 2>&1

    - name: Run syntax tests
      run: cd test/syntax && ./test >> ../../ci_output.txt 2>&1

    - name: Upload CI output
      uses: actions/upload-artifact@v4
      with:
        name: ci_output
        path: ci_output.txt